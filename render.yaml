services:
  - type: web
    name: multimarks-analytics
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PERSISTENT_DIR
        value: "/opt/render/project/src/persistent"
    healthCheckPath: /health
    autoDeploy: true
