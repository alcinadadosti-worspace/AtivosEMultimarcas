{% extends "base.html" %}

{% block title %}Meta por Setor - Multimarks Analytics{% endblock %}

{% block content %}
<style>
.meta-section {
    background: linear-gradient(135deg, rgba(30, 30, 45, 0.95) 0%, rgba(20, 20, 35, 0.98) 100%);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
}

.meta-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.8), rgba(236, 72, 153, 0.8), transparent);
}

.meta-section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.meta-section-title i { color: #a78bfa; }

/* ── Planilha banner ───────────────────────────────────── */
.planilha-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: #4ade80;
    margin-bottom: 20px;
}

.planilha-banner i { flex-shrink: 0; }

/* ── Override grid ─────────────────────────────────────── */
.metas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
}

.meta-input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 12px;
    padding: 14px;
}

.meta-input-group label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #a78bfa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

.meta-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.meta-input-group input[type="number"] {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 7px;
    padding: 6px 10px;
    color: #f8fafc;
    font-size: 0.85rem;
    font-family: var(--font-mono);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    box-sizing: border-box;
}

.meta-input-group input[type="number"]:focus { border-color: rgba(139, 92, 246, 0.7); }
.meta-input-group input[type="number"]::placeholder { color: #475569; }

/* Slider */
.meta-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 99px;
    outline: none;
    cursor: pointer;
    transition: opacity 0.2s;
}

.meta-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #a78bfa;
    box-shadow: 0 0 6px rgba(167,139,250,0.6);
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.1s;
}

.meta-slider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 12px rgba(167,139,250,0.9);
    transform: scale(1.15);
}

.meta-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: #a78bfa;
    box-shadow: 0 0 6px rgba(167,139,250,0.6);
    cursor: pointer;
}

.meta-valor-display {
    font-size: 0.78rem;
    font-family: var(--font-mono);
    color: #e2e8f0;
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
}

/* ── Tabela ────────────────────────────────────────────── */
.meta-table-wrap { overflow-x: auto; }

.meta-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.82rem;
}

.meta-table thead th {
    background: rgba(139, 92, 246, 0.1);
    color: #a78bfa;
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 5;
}

.meta-table tbody tr { transition: background 0.15s; }
.meta-table tbody tr:hover { background: rgba(139, 92, 246, 0.06); }

.meta-table tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    color: #e2e8f0;
    white-space: nowrap;
}

.meta-table tbody tr:last-child td { border-bottom: none; }

/* Célula de valor com linha de meta */
.cell-valor { font-family: var(--font-mono); }
.cell-real  { font-weight: 600; }
.cell-meta  { font-size: 0.7rem; color: #64748b; margin-top: 1px; }
.cell-pct   { font-size: 0.7rem; margin-top: 1px; }

/* Colorização da % por desempenho */
.pct-ok   { color: #4ade80; }
.pct-near { color: #fbbf24; }
.pct-bad  { color: #f87171; }

/* ── Badges ────────────────────────────────────────────── */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
}

.badge-bateu   { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.badge-quase   { background: rgba(251,191,36,0.15);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.badge-longe   { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.badge-sem-meta{ background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.2); font-style: italic; }

/* Indicador de fonte da meta */
.fonte-badge {
    display: inline-block;
    font-size: 0.62rem;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.04em;
    vertical-align: middle;
    margin-left: 4px;
}
.fonte-planilha { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.fonte-manual   { background: rgba(139,92,246,0.15);  color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

/* ── Filtros ───────────────────────────────────────────── */
.filtros-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 0;
    align-items: flex-end;
}

.filtro-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 180px;
}

.filtro-group label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.filtro-group select {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 8px;
    color: #f8fafc;
    padding: 8px 12px;
    font-size: 0.85rem;
    outline: none;
}

.btn-aplicar {
    background: linear-gradient(135deg, rgba(139,92,246,0.4), rgba(236,72,153,0.4));
    border: 1px solid rgba(139, 92, 246, 0.5);
    border-radius: 8px;
    color: #f8fafc;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-aplicar:hover { background: linear-gradient(135deg, rgba(139,92,246,0.6), rgba(236,72,153,0.6)); }

/* ── Resumo cards ──────────────────────────────────────── */
.legenda {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    font-size: 0.78rem;
    color: #94a3b8;
    align-items: center;
}

.resumo-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
}

.resumo-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
}

.resumo-card .num {
    font-size: 1.6rem;
    font-weight: 700;
    font-family: var(--font-mono);
}

.resumo-card .lbl { font-size: 0.72rem; color: #94a3b8; margin-top: 4px; }

.num-bateu { color: #4ade80; }
.num-quase { color: #fbbf24; }
.num-longe { color: #f87171; }
.num-total { color: #a78bfa; }

.empty-state { text-align: center; padding: 60px 20px; color: #475569; }
.empty-state p { margin-top: 8px; font-size: 0.9rem; }

/* Override hint */
.override-hint {
    font-size: 0.75rem;
    color: #64748b;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border-left: 3px solid rgba(139,92,246,0.4);
}
</style>

<div class="page-header">
    <h1 class="page-title">Meta por Setor</h1>
    <p class="page-subtitle">Acompanhe o desempenho de cada setor em relação às metas</p>
</div>

<div x-data="metaSetor()" x-init="init()">

    <!-- Sem dados -->
    <template x-if="!hasData">
        <div class="meta-section">
            <div class="empty-state">
                <i data-lucide="upload" style="width:48px;height:48px;color:#475569;margin-bottom:12px;"></i>
                <p>Carregue uma planilha no Dashboard para visualizar os setores.</p>
            </div>
        </div>
    </template>

    <template x-if="hasData">
        <div>
            <!-- Filtros -->
            <div class="meta-section">
                <div class="meta-section-title">
                    <i data-lucide="filter" style="width:18px;height:18px;"></i>
                    Filtros
                </div>
                <div class="filtros-row">
                    <div class="filtro-group">
                        <label>Ciclo</label>
                        <select x-model="filtros.ciclo">
                            <option value="">Todos os ciclos</option>
                            <template x-for="c in opcoes.ciclos" :key="c">
                                <option :value="c" x-text="c"></option>
                            </template>
                        </select>
                    </div>
                    <div class="filtro-group">
                        <label>Gerência</label>
                        <select x-model="filtros.gerencia">
                            <option value="">Todas as gerências</option>
                            <template x-for="g in opcoes.gerencias" :key="g">
                                <option :value="g" x-text="g"></option>
                            </template>
                        </select>
                    </div>
                    <button class="btn-aplicar" @click="buscarDados()">Aplicar</button>
                </div>
            </div>

            <!-- Override manual de metas -->
            <div class="meta-section">
                <div class="meta-section-title">
                    <i data-lucide="sliders-horizontal" style="width:18px;height:18px;"></i>
                    Ajuste Global de Metas
                    <span style="font-size:0.78rem;font-weight:400;color:#64748b;margin-left:4px;">(opcional)</span>
                </div>

                <!-- Banner planilha carregada -->
                <template x-if="planilhaCarregada">
                    <div class="planilha-banner">
                        <i data-lucide="check-circle" style="width:16px;height:16px;"></i>
                        <span>
                            <strong x-text="totalComMeta"></strong> setores com metas carregadas da planilha <strong>metas.xlsx</strong>.
                            Os ajustes abaixo substituem os valores da planilha para todos os setores no indicador escolhido.
                        </span>
                    </div>
                </template>

                <template x-if="!planilhaCarregada">
                    <div class="override-hint">
                        Nenhuma planilha de metas encontrada (<code>metas.xlsx</code> na raiz do servidor).
                        Use os campos abaixo para definir metas manuais para todos os setores.
                    </div>
                </template>

                <div class="metas-grid">

                    <!-- Receita -->
                    <div class="meta-input-group">
                        <label>Receita (R$) <span x-show="override.receita > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.receita" placeholder="deixe 0 para usar planilha" min="0" step="1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.receita > 0" x-text="fmt.currency(override.receita)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" :max="ranges.receita" :step="Math.max(1, Math.round(ranges.receita / 200))"
                               :value="override.receita || 0"
                               :style="sliderStyle(override.receita, ranges.receita)"
                               @input="override.receita = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- Clientes Ativos -->
                    <div class="meta-input-group">
                        <label>Clientes Ativos <span x-show="override.clientes_ativos > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.clientes_ativos" placeholder="deixe 0 para usar planilha" min="0" step="1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.clientes_ativos > 0" x-text="fmt.number(override.clientes_ativos)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" :max="ranges.clientes_ativos" :step="1"
                               :value="override.clientes_ativos || 0"
                               :style="sliderStyle(override.clientes_ativos, ranges.clientes_ativos)"
                               @input="override.clientes_ativos = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- RPA -->
                    <div class="meta-input-group">
                        <label>RPA (R$) <span x-show="override.rpa > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.rpa" placeholder="deixe 0 para usar planilha" min="0" step="1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.rpa > 0" x-text="fmt.currency(override.rpa)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" :max="ranges.rpa" :step="Math.max(1, Math.round(ranges.rpa / 200))"
                               :value="override.rpa || 0"
                               :style="sliderStyle(override.rpa, ranges.rpa)"
                               @input="override.rpa = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- Multimarca Qtd -->
                    <div class="meta-input-group">
                        <label>Multimarca Qtd <span x-show="override.clientes_multimarcas > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.clientes_multimarcas" placeholder="deixe 0 para usar planilha" min="0" step="1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.clientes_multimarcas > 0" x-text="fmt.number(override.clientes_multimarcas)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" :max="ranges.clientes_multimarcas" :step="1"
                               :value="override.clientes_multimarcas || 0"
                               :style="sliderStyle(override.clientes_multimarcas, ranges.clientes_multimarcas)"
                               @input="override.clientes_multimarcas = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- Multimarca % -->
                    <div class="meta-input-group">
                        <label>Multimarca % <span x-show="override.percent_multimarcas > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.percent_multimarcas" placeholder="deixe 0 para usar planilha" min="0" max="100" step="0.1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.percent_multimarcas > 0" x-text="fmt.percent(override.percent_multimarcas)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" max="100" step="0.5"
                               :value="override.percent_multimarcas || 0"
                               :style="sliderStyle(override.percent_multimarcas, 100)"
                               @input="override.percent_multimarcas = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- IAF Cabelo Qtd -->
                    <div class="meta-input-group">
                        <label>IAF Cabelo Qtd <span x-show="override.clientes_cabelos > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.clientes_cabelos" placeholder="deixe 0 para usar planilha" min="0" step="1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.clientes_cabelos > 0" x-text="fmt.number(override.clientes_cabelos)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" :max="ranges.clientes_cabelos" :step="1"
                               :value="override.clientes_cabelos || 0"
                               :style="sliderStyle(override.clientes_cabelos, ranges.clientes_cabelos)"
                               @input="override.clientes_cabelos = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- IAF Cabelo % -->
                    <div class="meta-input-group">
                        <label>IAF Cabelo % <span x-show="override.percent_cabelos > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.percent_cabelos" placeholder="deixe 0 para usar planilha" min="0" max="100" step="0.1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.percent_cabelos > 0" x-text="fmt.percent(override.percent_cabelos)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" max="100" step="0.5"
                               :value="override.percent_cabelos || 0"
                               :style="sliderStyle(override.percent_cabelos, 100)"
                               @input="override.percent_cabelos = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- IAF Make Qtd -->
                    <div class="meta-input-group">
                        <label>IAF Make Qtd <span x-show="override.clientes_make > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.clientes_make" placeholder="deixe 0 para usar planilha" min="0" step="1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.clientes_make > 0" x-text="fmt.number(override.clientes_make)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" :max="ranges.clientes_make" :step="1"
                               :value="override.clientes_make || 0"
                               :style="sliderStyle(override.clientes_make, ranges.clientes_make)"
                               @input="override.clientes_make = +$event.target.value; calcularStatus()">
                    </div>

                    <!-- IAF Make % -->
                    <div class="meta-input-group">
                        <label>IAF Make % <span x-show="override.percent_make > 0" class="fonte-badge fonte-manual">override</span></label>
                        <div class="meta-input-row">
                            <input type="number" x-model.number="override.percent_make" placeholder="deixe 0 para usar planilha" min="0" max="100" step="0.1" @input="calcularStatus()">
                            <span class="meta-valor-display" x-show="override.percent_make > 0" x-text="fmt.percent(override.percent_make)"></span>
                        </div>
                        <input type="range" class="meta-slider" min="0" max="100" step="0.5"
                               :value="override.percent_make || 0"
                               :style="sliderStyle(override.percent_make, 100)"
                               @input="override.percent_make = +$event.target.value; calcularStatus()">
                    </div>

                </div>
            </div>

            <!-- Tabela de desempenho -->
            <div class="meta-section">
                <div class="meta-section-title">
                    <i data-lucide="bar-chart-2" style="width:18px;height:18px;"></i>
                    Desempenho por Setor
                    <span style="margin-left:auto;font-size:0.8rem;font-weight:400;color:#64748b;" x-text="dados.length + ' setores'"></span>
                </div>

                <!-- Resumo contadores -->
                <div class="resumo-cards">
                    <div class="resumo-card">
                        <div class="num num-total" x-text="dados.length"></div>
                        <div class="lbl">Total Setores</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num num-bateu" x-text="contagem.bateu"></div>
                        <div class="lbl">Bateram a Meta</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num num-quase" x-text="contagem.quase"></div>
                        <div class="lbl">Quase Lá</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num num-longe" x-text="contagem.longe"></div>
                        <div class="lbl">Precisa Melhorar</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num" style="color:#64748b;" x-text="contagem.sem_meta"></div>
                        <div class="lbl">Sem Meta Definida</div>
                    </div>
                </div>

                <!-- Legenda -->
                <div class="legenda">
                    <span style="color:#4ade80;">&#9679;</span> Bateu a Meta (≥ 100% em todos os indicadores)
                    <span style="color:#fbbf24;">&#9679;</span> Quase Lá (≥ 80%)
                    <span style="color:#f87171;">&#9679;</span> Precisa Melhorar (&lt; 80%)
                    &nbsp;|&nbsp;
                    <span class="fonte-badge fonte-planilha">planilha</span> meta da planilha &nbsp;
                    <span class="fonte-badge fonte-manual">override</span> meta manual
                </div>

                <!-- Loading -->
                <template x-if="loading">
                    <div style="text-align:center;padding:40px;color:#64748b;">Carregando...</div>
                </template>

                <!-- Tabela -->
                <template x-if="!loading">
                    <div class="meta-table-wrap">
                        <table class="meta-table">
                            <thead>
                                <tr>
                                    <th>Setor</th>
                                    <th>Supervisora</th>
                                    <th>Status</th>
                                    <th>Receita</th>
                                    <th>Clientes Ativos</th>
                                    <th>RPA</th>
                                    <th>Multi Qtd</th>
                                    <th>Multi %</th>
                                    <th>Cabelo Qtd</th>
                                    <th>Cabelo %</th>
                                    <th>Make Qtd</th>
                                    <th>Make %</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="s in dados" :key="s.setor">
                                    <tr>
                                        <td style="font-weight:600;color:#f8fafc;max-width:200px;white-space:normal;" x-text="s.setor"></td>

{% block scripts %}
<script>
function metaSetor() {
    return {
        hasData: {{ 'true' if has_data else 'false' }},
        loading: false,
        dados: [],               // setores com métricas reais + meta_planilha
        opcoes: { ciclos: [], gerencias: [] },
        filtros: { ciclo: '', gerencia: '' },

        // Override global — zero = "sem override, usa planilha"
        override: {
            receita:             0,
            clientes_ativos:     0,
            rpa:                 0,
            clientes_multimarcas:0,
            percent_multimarcas: 0,
            clientes_cabelos:    0,
            percent_cabelos:     0,
            clientes_make:       0,
            percent_make:        0,
        },

        contagem: { bateu: 0, quase: 0, longe: 0, sem_meta: 0 },
        ranges: {
            receita:             100000,
            clientes_ativos:     200,
            rpa:                 2000,
            clientes_multimarcas:100,
            clientes_cabelos:    100,
            clientes_make:       100,
        },

        get planilhaCarregada() {
            return this.dados.some(s => s.meta_planilha !== null);
        },

        get totalComMeta() {
            return this.dados.filter(s => s.meta_planilha !== null).length;
        },

        fmt: {
            currency(v) {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
            },
            number(v) {
                return new Intl.NumberFormat('pt-BR').format(v || 0);
            },
            percent(v) {
                return (v || 0).toFixed(1) + '%';
            },
        },

        // Retorna a meta efetiva para o campo: override > planilha > null
        metaEfetiva(setor, campo) {
            const ov = this.override[campo];
            if (ov !== null && ov !== undefined && Number(ov) > 0) {
                return Number(ov);
            }
            if (setor.meta_planilha && setor.meta_planilha[campo] > 0) {
                return setor.meta_planilha[campo];
            }
            return null;
        },

        // Indica de onde veio a meta (para exibição)
        fonteIcon(setor, campo) {
            const ov = this.override[campo];
            if (ov !== null && ov !== undefined && Number(ov) > 0) {
                return ' ▲';  // override manual
            }
            return '';
        },

        async init() {
            if (!this.hasData) return;
            await this.carregarOpcoes();
            // Pré-selecionar gerência 13707 se existir nos dados
            if (this.opcoes.gerencias.includes('13707')) {
                this.filtros.gerencia = '13707';
            }
            await this.buscarDados();
        },

        async carregarOpcoes() {
            try {
                const res = await fetch('/api/filtros');
                const data = await res.json();
                this.opcoes.ciclos    = data.ciclos    || [];
                this.opcoes.gerencias = data.gerencias || [];
            } catch (e) {
                console.error('Erro ao carregar opções:', e);
            }
        },

        async buscarDados() {
            this.loading = true;
            try {
                const params = new URLSearchParams();
                if (this.filtros.ciclo)    params.set('ciclos',    this.filtros.ciclo);
                if (this.filtros.gerencia) params.set('gerencias', this.filtros.gerencia);

                const res  = await fetch('/api/metas/por-setor?' + params);
                this.dados = await res.json();
                this.atualizarRanges();
                this.calcularStatus();
            } catch (e) {
                console.error('Erro ao buscar dados:', e);
            } finally {
                this.loading = false;
            }
        },

        atualizarRanges() {
            if (!this.dados.length) return;
            const maxOf = f => Math.max(...this.dados.map(s => s[f] || 0));
            const ceil2 = v => v <= 0 ? 100 : Math.ceil(v * 1.5 / 10) * 10;

            // Também considera as metas da planilha no cálculo do range
            const maxPlanilha = f => Math.max(0, ...this.dados.map(s =>
                s.meta_planilha ? (s.meta_planilha[f] || 0) : 0));

            this.ranges.receita              = ceil2(Math.max(maxOf('receita'),              maxPlanilha('receita')));
            this.ranges.clientes_ativos      = ceil2(Math.max(maxOf('clientes_ativos'),      maxPlanilha('clientes_ativos')));
            this.ranges.rpa                  = ceil2(Math.max(maxOf('rpa'),                  maxPlanilha('rpa')));
            this.ranges.clientes_multimarcas = ceil2(Math.max(maxOf('clientes_multimarcas'), maxPlanilha('clientes_multimarcas')));
            this.ranges.clientes_cabelos     = ceil2(Math.max(maxOf('clientes_cabelos'),     maxPlanilha('clientes_cabelos')));
            this.ranges.clientes_make        = ceil2(Math.max(maxOf('clientes_make'),        maxPlanilha('clientes_make')));
        },

        sliderStyle(valor, max) {
            const pct = max > 0 ? Math.min(100, ((valor || 0) / max) * 100) : 0;
            return `background: linear-gradient(to right, #a78bfa ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
        },

        // Pior % atingida entre os indicadores que têm meta efetiva
        piorPct(setor) {
            const campos = [
                'receita','clientes_ativos','rpa',
                'clientes_multimarcas','percent_multimarcas',
                'clientes_cabelos','percent_cabelos',
                'clientes_make','percent_make',
            ];
            let pior = Infinity, temMeta = false;
            for (const campo of campos) {
                const meta = this.metaEfetiva(setor, campo);
                if (meta !== null && meta > 0) {
                    temMeta = true;
                    const p = (setor[campo] / meta) * 100;
                    if (p < pior) pior = p;
                }
            }
            return temMeta ? pior : null;
        },

        calcularStatus() {
            let bateu = 0, quase = 0, longe = 0, sem_meta = 0;

            this.dados = this.dados.map(s => {
                const pct = this.piorPct(s);
                let status;
                if (pct === null)    { status = 'sem_meta'; sem_meta++; }
                else if (pct >= 100) { status = 'bateu';    bateu++;    }
                else if (pct >= 80)  { status = 'quase';    quase++;    }
                else                 { status = 'longe';    longe++;    }
                return { ...s, _status: status };
            });

            // Ordenar: bateu > quase > longe > sem_meta
            const ordem = { bateu: 0, quase: 1, longe: 2, sem_meta: 3 };
            this.dados.sort((a, b) => ordem[a._status] - ordem[b._status]);

            this.contagem = { bateu, quase, longe, sem_meta };
        },

        pctStr(real, meta) {
            if (!meta || meta <= 0) return '';
            return ((real / meta) * 100).toFixed(1) + '% da meta';
        },

        pctClass(real, meta) {
            if (!meta || meta <= 0) return '';
            const p = (real / meta) * 100;
            if (p >= 100) return 'pct-ok';
            if (p >= 80)  return 'pct-near';
            return 'pct-bad';
        },

        badgeClass(status) {
            return {
                'badge-bateu':    status === 'bateu',
                'badge-quase':    status === 'quase',
                'badge-longe':    status === 'longe',
                'badge-sem-meta': status === 'sem_meta',
            };
        },

        badgeIcon(status) {
            return { bateu: '✓', quase: '~', longe: '!', sem_meta: '—' }[status] || '';
        },

        badgeLabel(status) {
            return {
                bateu:    'Bateu a Meta',
                quase:    'Quase Lá',
                longe:    'Precisa Melhorar',
                sem_meta: 'Sem Meta',
            }[status] || '';
        },
    };
}
</script>
{% endblock %}
