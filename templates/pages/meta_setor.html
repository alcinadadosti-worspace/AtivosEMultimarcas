{% extends "base.html" %}

{% block title %}Meta por Setor - Multimarks Analytics{% endblock %}

{% block content %}
<style>
.meta-section {
    background: linear-gradient(135deg, rgba(30, 30, 45, 0.95) 0%, rgba(20, 20, 35, 0.98) 100%);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
}

.meta-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.8), rgba(236, 72, 153, 0.8), transparent);
}

.meta-section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.meta-section-title i { color: #a78bfa; }

/* ── Planilha banner ───────────────────────────────────── */
.planilha-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: #4ade80;
    margin-bottom: 20px;
}

.planilha-banner i { flex-shrink: 0; }

/* ── Tabela ────────────────────────────────────────────── */
.meta-table-wrap { overflow-x: auto; }

.meta-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.82rem;
}

.meta-table thead th {
    background: rgba(139, 92, 246, 0.1);
    color: #a78bfa;
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 5;
}

.meta-table tbody tr { transition: background 0.15s; }
.meta-table tbody tr:hover { background: rgba(139, 92, 246, 0.06); }

.meta-table tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    color: #e2e8f0;
    white-space: nowrap;
}

.meta-table tbody tr:last-child td { border-bottom: none; }

/* Célula de valor com linha de meta */
.cell-valor { font-family: var(--font-mono); }
.cell-real  { font-weight: 600; }
.cell-meta  { font-size: 0.7rem; color: #64748b; margin-top: 1px; }
.cell-pct   { font-size: 0.7rem; margin-top: 1px; }

/* Colorização da % por desempenho */
.pct-ok   { color: #4ade80; }
.pct-near { color: #fbbf24; }
.pct-bad  { color: #f87171; }

/* ── Badges ────────────────────────────────────────────── */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
}

.badge-bateu   { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.badge-quase   { background: rgba(251,191,36,0.15);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.badge-longe   { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.badge-sem-meta{ background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.2); font-style: italic; }


/* ── Filtros ───────────────────────────────────────────── */
.filtros-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 0;
    align-items: flex-end;
}

.filtro-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 180px;
}

.filtro-group label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.filtro-group select {
    background: #1e1e2d;
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 8px;
    color: #f8fafc;
    padding: 8px 12px;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
}

.filtro-group select option {
    background-color: #1e1e2d;
    color: #f8fafc;
}


/* ── Resumo cards ──────────────────────────────────────── */
.legenda {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    font-size: 0.78rem;
    color: #94a3b8;
    align-items: center;
}

.resumo-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
}

.resumo-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
}

.resumo-card .num {
    font-size: 1.6rem;
    font-weight: 700;
    font-family: var(--font-mono);
}

.resumo-card .lbl { font-size: 0.72rem; color: #94a3b8; margin-top: 4px; }

.num-bateu { color: #4ade80; }
.num-quase { color: #fbbf24; }
.num-longe { color: #f87171; }
.num-total { color: #a78bfa; }

.empty-state { text-align: center; padding: 60px 20px; color: #475569; }
.empty-state p { margin-top: 8px; font-size: 0.9rem; }

</style>

<div class="page-header">
    <h1 class="page-title">Meta por Setor</h1>
    <p class="page-subtitle">Acompanhe o desempenho de cada setor em relação às metas</p>
</div>

<div x-data="metaSetor()" x-init="init()">

    <!-- Sem dados -->
    <template x-if="!hasData">
        <div class="meta-section">
            <div class="empty-state">
                <i data-lucide="upload" style="width:48px;height:48px;color:#475569;margin-bottom:12px;"></i>
                <p>Carregue uma planilha no Dashboard para visualizar os setores.</p>
            </div>
        </div>
    </template>

    <template x-if="hasData">
        <div>
            <!-- Filtros -->
            <div class="meta-section">
                <div class="meta-section-title">
                    <i data-lucide="filter" style="width:18px;height:18px;"></i>
                    Filtros
                </div>
                <div class="filtros-row">
                    <div class="filtro-group">
                        <label>Ciclo</label>
                        <select x-model="filtros.ciclo" @change="buscarDados()">
                            <option value="">Todos os ciclos</option>
                            <template x-for="c in opcoes.ciclos" :key="c">
                                <option :value="c" x-text="c"></option>
                            </template>
                        </select>
                    </div>
                    <div class="filtro-group">
                        <label>Gerência</label>
                        <select x-model="filtros.gerencia" @change="buscarDados()">
                            <option value="">Todas as gerências</option>
                            <template x-for="g in opcoes.gerencias" :key="g">
                                <option :value="g" x-text="g"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Tabela de desempenho -->
            <div class="meta-section">
                <div class="meta-section-title">
                    <i data-lucide="bar-chart-2" style="width:18px;height:18px;"></i>
                    Desempenho por Setor
                    <span style="margin-left:auto;display:flex;align-items:center;gap:10px;">
                        <span style="font-size:0.8rem;font-weight:400;color:#64748b;" x-text="dados.length + ' setores'"></span>
                        <button @click="imprimirTodos()" title="Imprimir todos os setores"
                            style="display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(236,72,153,0.3));
                                   border:1px solid rgba(139,92,246,0.4);border-radius:8px;padding:5px 12px;
                                   color:#e2e8f0;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;"
                            onmouseover="this.style.background='linear-gradient(135deg,rgba(139,92,246,0.5),rgba(236,72,153,0.5))'"
                            onmouseout="this.style.background='linear-gradient(135deg,rgba(139,92,246,0.3),rgba(236,72,153,0.3))'">
                            <i data-lucide="printer" style="width:13px;height:13px;"></i>
                            Imprimir Todos
                        </button>
                    </span>
                </div>

                <!-- Resumo contadores -->
                <div class="resumo-cards">
                    <div class="resumo-card">
                        <div class="num num-total" x-text="dados.length"></div>
                        <div class="lbl">Total Setores</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num num-bateu" x-text="contagem.bateu"></div>
                        <div class="lbl">Bateram a Meta</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num num-quase" x-text="contagem.quase"></div>
                        <div class="lbl">Quase Lá</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num num-longe" x-text="contagem.longe"></div>
                        <div class="lbl">Precisa Melhorar</div>
                    </div>
                    <div class="resumo-card">
                        <div class="num" style="color:#64748b;" x-text="contagem.sem_meta"></div>
                        <div class="lbl">Sem Meta Definida</div>
                    </div>
                </div>

                <!-- Legenda -->
                <div class="legenda">
                    <span style="color:#4ade80;">&#9679;</span> Bateu a Meta (≥ 100% da meta)
                    <span style="color:#fbbf24;">&#9679;</span> Quase Lá (≥ 60% da meta)
                    <span style="color:#f87171;">&#9679;</span> Precisa Melhorar (&lt; 60% da meta)
                </div>

                <!-- Loading -->
                <template x-if="loading">
                    <div style="text-align:center;padding:40px;color:#64748b;">Carregando...</div>
                </template>

                <!-- Tabela -->
                <template x-if="!loading">
                    <div class="meta-table-wrap">
                        <table class="meta-table">
                            <thead>
                                <tr>
                                    <th style="width:36px;"></th>
                                    <th>Setor</th>
                                    <th>Supervisora</th>
                                    <th>Status</th>
                                    <th>Receita</th>
                                    <th>Clientes Ativos</th>
                                    <th>RPA</th>
                                    <th>Multi %</th>
                                    <th>Cabelo %</th>
                                    <th>Make %</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="s in dados" :key="s.setor">
                                    <tr>
                                        <!-- Botão de impressão -->
                                        <td style="text-align:center;padding:6px;">
                                            <button @click="imprimirSetor(s)" title="Imprimir setor"
                                                style="background:none;border:1px solid rgba(139,92,246,0.3);border-radius:6px;
                                                       padding:4px 6px;cursor:pointer;color:#a78bfa;transition:all 0.2s;"
                                                onmouseover="this.style.background='rgba(139,92,246,0.15)'"
                                                onmouseout="this.style.background='none'">
                                                <i data-lucide="printer" style="width:14px;height:14px;display:block;"></i>
                                            </button>
                                        </td>

                                        <td style="font-weight:600;color:#f8fafc;max-width:200px;white-space:normal;" x-text="s.setor"></td>
                                        <td style="color:#94a3b8;font-size:0.78rem;" x-text="s.supervisora || '—'"></td>
                                        <td>
                                            <span :class="badgeClass(s._status)" class="badge">
                                                <span x-text="badgeIcon(s._status)"></span>
                                                <span x-text="badgeLabel(s._status)"></span>
                                            </span>
                                        </td>

                                        <!-- Receita -->
                                        <td class="cell-valor">
                                            <div class="cell-real" x-text="fmt.currency(s.receita)"></div>
                                            <template x-if="metaEfetiva(s, 'receita') !== null">
                                                <div>
                                                    <div class="cell-meta" x-text="'meta: ' + fmt.currency(metaEfetiva(s, 'receita'))"></div>
                                                    <div :class="pctClass(s.receita, metaEfetiva(s,'receita'))" class="cell-pct" x-text="pctStr(s.receita, metaEfetiva(s,'receita'))"></div>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Clientes Ativos -->
                                        <td class="cell-valor">
                                            <div class="cell-real" x-text="fmt.number(s.clientes_ativos)"></div>
                                            <template x-if="metaEfetiva(s, 'clientes_ativos') !== null">
                                                <div>
                                                    <div class="cell-meta" x-text="'meta: ' + fmt.number(metaEfetiva(s, 'clientes_ativos'))"></div>
                                                    <div :class="pctClass(s.clientes_ativos, metaEfetiva(s,'clientes_ativos'))" class="cell-pct" x-text="pctStr(s.clientes_ativos, metaEfetiva(s,'clientes_ativos'))"></div>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- RPA -->
                                        <td class="cell-valor">
                                            <div class="cell-real" x-text="fmt.currency(s.rpa)"></div>
                                            <template x-if="metaEfetiva(s, 'rpa') !== null">
                                                <div>
                                                    <div class="cell-meta" x-text="'meta: ' + fmt.currency(metaEfetiva(s, 'rpa'))"></div>
                                                    <div :class="pctClass(s.rpa, metaEfetiva(s,'rpa'))" class="cell-pct" x-text="pctStr(s.rpa, metaEfetiva(s,'rpa'))"></div>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Multi % -->
                                        <td class="cell-valor">
                                            <div class="cell-real" x-text="fmt.percent(s.percent_multimarcas)"></div>
                                            <template x-if="metaEfetiva(s, 'percent_multimarcas') !== null">
                                                <div>
                                                    <div class="cell-meta" x-text="'meta: ' + fmt.percent(metaEfetiva(s, 'percent_multimarcas'))"></div>
                                                    <div :class="pctClass(s.percent_multimarcas, metaEfetiva(s,'percent_multimarcas'))" class="cell-pct" x-text="pctStr(s.percent_multimarcas, metaEfetiva(s,'percent_multimarcas'))"></div>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Cabelo % -->
                                        <td class="cell-valor">
                                            <div class="cell-real" x-text="fmt.percent(s.percent_cabelos)"></div>
                                            <template x-if="metaEfetiva(s, 'percent_cabelos') !== null">
                                                <div>
                                                    <div class="cell-meta" x-text="'meta: ' + fmt.percent(metaEfetiva(s, 'percent_cabelos'))"></div>
                                                    <div :class="pctClass(s.percent_cabelos, metaEfetiva(s,'percent_cabelos'))" class="cell-pct" x-text="pctStr(s.percent_cabelos, metaEfetiva(s,'percent_cabelos'))"></div>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Make % -->
                                        <td class="cell-valor">
                                            <div class="cell-real" x-text="fmt.percent(s.percent_make)"></div>
                                            <template x-if="metaEfetiva(s, 'percent_make') !== null">
                                                <div>
                                                    <div class="cell-meta" x-text="'meta: ' + fmt.percent(metaEfetiva(s, 'percent_make'))"></div>
                                                    <div :class="pctClass(s.percent_make, metaEfetiva(s,'percent_make'))" class="cell-pct" x-text="pctStr(s.percent_make, metaEfetiva(s,'percent_make'))"></div>
                                                </div>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function metaSetor() {
    return {
        hasData: {{ 'true' if has_data else 'false' }},
        loading: false,
        dados: [],               // setores com métricas reais + meta_planilha
        opcoes: { ciclos: [], gerencias: [] },
        filtros: { ciclo: '', gerencia: '' },

        contagem: { bateu: 0, quase: 0, longe: 0, sem_meta: 0 },

        fmt: {
            currency(v) {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
            },
            number(v) {
                return new Intl.NumberFormat('pt-BR').format(v || 0);
            },
            percent(v) {
                return (v || 0).toFixed(1) + '%';
            },
        },

        // Retorna a meta da planilha para o campo
        metaEfetiva(setor, campo) {
            if (setor.meta_planilha && setor.meta_planilha[campo] > 0) {
                return setor.meta_planilha[campo];
            }
            return null;
        },

        async init() {
            if (!this.hasData) return;
            await Promise.all([this.carregarOpcoes(), this.buscarDados()]);
        },

        async carregarOpcoes() {
            try {
                const res = await fetch('/api/filtros');
                const data = await res.json();
                this.opcoes.ciclos    = data.ciclos    || [];
                this.opcoes.gerencias = data.gerencias || [];
            } catch (e) {
                console.error('Erro ao carregar opções:', e);
            }
        },

        async buscarDados() {
            this.loading = true;
            try {
                const params = new URLSearchParams();
                if (this.filtros.ciclo)    params.set('ciclos',    this.filtros.ciclo);
                if (this.filtros.gerencia) params.set('gerencias', this.filtros.gerencia);

                const res  = await fetch('/api/metas/por-setor?' + params);
                this.dados = await res.json();
                this.calcularStatus();
            } catch (e) {
                console.error('Erro ao buscar dados:', e);
            } finally {
                this.loading = false;
            }
        },

        // Pior % atingida entre os indicadores que têm meta efetiva
        piorPct(setor) {
            const campos = [
                'receita','clientes_ativos','rpa',
                'clientes_multimarcas','percent_multimarcas',
                'clientes_cabelos','percent_cabelos',
                'clientes_make','percent_make',
            ];
            let pior = Infinity, temMeta = false;
            for (const campo of campos) {
                const meta = this.metaEfetiva(setor, campo);
                if (meta !== null && meta > 0) {
                    temMeta = true;
                    const p = (setor[campo] / meta) * 100;
                    if (p < pior) pior = p;
                }
            }
            return temMeta ? pior : null;
        },

        calcularStatus() {
            let bateu = 0, quase = 0, longe = 0, sem_meta = 0;

            this.dados = this.dados.map(s => {
                const pct = this.piorPct(s);
                let status;
                if (pct === null)    { status = 'sem_meta'; sem_meta++; }
                else if (pct >= 100) { status = 'bateu';    bateu++;    }
                else if (pct >= 60)  { status = 'quase';    quase++;    }
                else                 { status = 'longe';    longe++;    }
                return { ...s, _status: status };
            });

            // Ordenar: bateu > quase > longe > sem_meta
            const ordem = { bateu: 0, quase: 1, longe: 2, sem_meta: 3 };
            this.dados.sort((a, b) => ordem[a._status] - ordem[b._status]);

            this.contagem = { bateu, quase, longe, sem_meta };
        },

        pctStr(real, meta) {
            if (!meta || meta <= 0) return '';
            return ((real / meta) * 100).toFixed(1) + '% da meta';
        },

        pctClass(real, meta) {
            if (!meta || meta <= 0) return '';
            const p = (real / meta) * 100;
            if (p >= 100) return 'pct-ok';
            if (p >= 80)  return 'pct-near';
            return 'pct-bad';
        },

        badgeClass(status) {
            return {
                'badge-bateu':    status === 'bateu',
                'badge-quase':    status === 'quase',
                'badge-longe':    status === 'longe',
                'badge-sem-meta': status === 'sem_meta',
            };
        },

        badgeIcon(status) {
            return { bateu: '✓', quase: '~', longe: '!', sem_meta: '—' }[status] || '';
        },

        badgeLabel(status) {
            return {
                bateu:    'Bateu a Meta',
                quase:    'Quase Lá',
                longe:    'Precisa Melhorar',
                sem_meta: 'Sem Meta',
            }[status] || '';
        },

        imprimirSetor(s) {
            const me = this.metaEfetiva.bind(this);
            const f  = this.fmt;

            const pct = (real, meta) => meta > 0 ? ((real / meta) * 100) : null;
            const pctFmt = (real, meta) => {
                const p = pct(real, meta);
                return p !== null ? p.toFixed(1) + '%' : '—';
            };
            const cor = (real, meta) => {
                const p = pct(real, meta);
                if (p === null) return '#94a3b8';
                if (p >= 100)  return '#4ade80';
                if (p >= 60)   return '#fbbf24';
                return '#f87171';
            };
            const barra = (real, meta) => {
                const p = pct(real, meta);
                if (p === null) return 0;
                return Math.min(100, p).toFixed(1);
            };
            const statusLabel = { bateu: 'Bateu a Meta', quase: 'Quase Lá', longe: 'Precisa Melhorar', sem_meta: 'Sem Meta' };
            const statusCor   = { bateu: '#4ade80', quase: '#fbbf24', longe: '#f87171', sem_meta: '#64748b' };

            const indicadores = [
                { label: 'Receita',          real: f.currency(s.receita),             meta: me(s,'receita'),             metaFmt: v => f.currency(v) },
                { label: 'Clientes Ativos',  real: f.number(s.clientes_ativos),        meta: me(s,'clientes_ativos'),     metaFmt: v => f.number(v)   },
                { label: 'RPA',              real: f.currency(s.rpa),                  meta: me(s,'rpa'),                 metaFmt: v => f.currency(v) },
                { label: 'Multimarca %',     real: f.percent(s.percent_multimarcas),   meta: me(s,'percent_multimarcas'), metaFmt: v => f.percent(v)  },
                { label: 'IAF Cabelo %',     real: f.percent(s.percent_cabelos),       meta: me(s,'percent_cabelos'),     metaFmt: v => f.percent(v)  },
                { label: 'IAF Make %',       real: f.percent(s.percent_make),          meta: me(s,'percent_make'),        metaFmt: v => f.percent(v)  },
            ];

            const cardsHtml = indicadores.map(ind => {
                const realNum = parseFloat(ind.real.replace(/[^\d,.-]/g,'').replace(',','.')) || 0;
                const metaVal = ind.meta;
                const p       = metaVal ? pct(parseFloat(String(ind.real).replace(/[^\d,.-]/g,'').replace(',','.')) || 0, metaVal) : null;
                const barPct  = metaVal ? Math.min(100, (p || 0)) : 0;
                const c       = metaVal ? cor(0, 1) : '#64748b'; // placeholder

                // Recalculate properly using the raw numeric fields
                const realNumMap = {
                    'Receita': s.receita, 'Clientes Ativos': s.clientes_ativos,
